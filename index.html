<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prestige Group</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.88)),
        url("Coverphoto.png") center center / cover no-repeat;
      color: #f5e7b2;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, rgba(212,175,55,0.10), transparent 45%);
      pointer-events: none;
    }

    .panel {
      position: relative;
      z-index: 1;
      width: min(92%, 760px);
      padding: 48px 36px;
      text-align: center;
      background: rgba(8, 8, 8, 0.58);
      border: 1px solid rgba(212, 175, 55, 0.18);
      box-shadow:
        0 0 30px rgba(0,0,0,0.45),
        0 0 60px rgba(212,175,55,0.06);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      animation: fadeUp 1s ease;
    }

    .logo-wrap {
      margin-bottom: 22px;
    }

    .logo {
      width: min(320px, 72vw);
      max-width: 100%;
      height: auto;
      display: block;
      margin: 0 auto;
      filter: drop-shadow(0 0 20px rgba(212,175,55,0.16));
    }

    h1 {
      margin: 10px 0 0;
      font-size: clamp(2rem, 4vw, 3.3rem);
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #d4af37;
      font-weight: 700;
    }

    .line {
      width: 110px;
      height: 1px;
      margin: 20px auto 28px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
    }

    p {
      margin: 0 auto;
      max-width: 600px;
      font-size: clamp(1rem, 1.5vw, 1.12rem);
      line-height: 1.9;
      color: rgba(255, 245, 210, 0.92);
    }

    .highlight {
      color: #d4af37;
      font-weight: 700;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 14px 34px;
      text-decoration: none;
      color: #d4af37;
      border: 1px solid #d4af37;
      border-radius: 999px;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      font-size: 0.95rem;
      transition: all 0.3s ease;
      background: rgba(212, 175, 55, 0.04);
    }

    .btn:hover {
      background: #d4af37;
      color: #111;
      box-shadow: 0 0 18px rgba(212, 175, 55, 0.25);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 28px;
      font-size: 12px;
      color: rgba(255, 239, 188, 0.60);
      letter-spacing: 0.4px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .panel {
        padding: 34px 20px;
        width: min(94%, 760px);
      }

      .logo {
        width: min(260px, 78vw);
      }

      .btn {
        width: 100%;
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="panel">
    <div class="logo-wrap">
      <img src="profilepic.png" alt="Prestige Group logo" class="logo" />
    </div>

    <h1>Coming Soon</h1>
    <div class="line"></div>

    <p>
      <span class="highlight">Prestige Group</span> is preparing a refined digital experience
      built around quality, trust, and elegance.
    </p>

    <a class="btn" href="mailto:info@prestigegroupmt.com">Contact Us</a>

    <div class="footer">© 2026 Prestige Group. All rights reserved.</div>
  </div>
</body>
</html>
