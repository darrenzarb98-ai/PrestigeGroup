<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prestige Group</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        linear-gradient(rgba(0,0,0,0.72), rgba(0,0,0,0.82)),
        url("Coverphoto.png") center center / cover no-repeat;
      color: #f4e7b0;
      overflow: hidden;
    }

    .overlay {
      width: 100%;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .content {
      text-align: center;
      max-width: 760px;
      animation: fadeUp 0.9s ease-out;
    }

    .eyebrow {
      color: #cfa63a;
      font-size: 14px;
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(3rem, 7vw, 5.8rem);
      line-height: 0.95;
      letter-spacing: 3px;
      color: #d4af37;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(212,175,55,0.12);
    }

    .divider {
      width: 120px;
      height: 1px;
      margin: 28px auto 30px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
    }

    p {
      margin: 0 auto;
      max-width: 680px;
      color: rgba(255,255,255,0.86);
      font-size: clamp(1rem, 2vw, 1.2rem);
      line-height: 1.8;
    }

    .highlight {
      color: #d4af37;
      font-weight: 700;
    }

    .actions {
      margin-top: 36px;
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      min-width: 180px;
      padding: 14px 28px;
      border: 1px solid #d4af37;
      border-radius: 999px;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      font-size: 0.92rem;
      transition: all 0.25s ease;
    }

    .btn-primary {
      background: #d4af37;
      color: #111;
    }

    .btn-primary:hover {
      background: #e1bf57;
      transform: translateY(-2px);
    }

    .btn-secondary {
      background: transparent;
      color: #d4af37;
    }

    .btn-secondary:hover {
      background: rgba(212,175,55,0.12);
      transform: translateY(-2px);
    }

    .footer {
      margin-top: 34px;
      color: rgba(255,255,255,0.52);
      font-size: 12px;
      letter-spacing: 0.4px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .actions {
        flex-direction: column;
        align-items: center;
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }

      p {
        padding: 0 8px;
      }
    }
  </style>
</head>
<body>
  <div class="overlay">
    <div class="content">
      <div class="eyebrow">Prestige Group</div>
      <h1>Coming Soon</h1>
      <div class="divider"></div>
      <p>
        A refined digital experience is on the way.
        <span class="highlight">Prestige Group</span> is preparing a premium online presence built around quality, trust, and elegance.
      </p>

      <div class="actions">
        <a class="btn btn-primary" href="mailto:info@prestigegroupmt.com">Contact Us</a>
        <a class="btn btn-secondary" href="https://www.prestigegroupmt.com">Refresh Site</a>
      </div>

      <div class="footer">© 2026 Prestige Group. All rights reserved.</div>
    </div>
  </div>
</body>
</html>
