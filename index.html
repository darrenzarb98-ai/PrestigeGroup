<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prestige Group</title>

<style>
body {
    margin: 0;
    background: radial-gradient(circle at top, #111, #000);
    color: white;
    font-family: 'Segoe UI', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    overflow: hidden;
}

.container {
    max-width: 700px;
    animation: fadeIn 1.5s ease-in-out;
}

h1 {
    font-size: 65px;
    letter-spacing: 3px;
    background: linear-gradient(90deg, #d4af37, #ffffff, #d4af37);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.line {
    width: 100px;
    height: 2px;
    background: #d4af37;
    margin: 30px auto;
}

p {
    color: #bbb;
    font-size: 18px;
    margin-top: 20px;
    line-height: 1.6;
}

button {
    margin-top: 35px;
    padding: 14px 35px;
    border: 1px solid #d4af37;
    background: transparent;
    color: #d4af37;
    cursor: pointer;
    letter-spacing: 1px;
    transition: 0.4s;
}

button:hover {
    background: #d4af37;
    color: black;
}

.footer {
    position: absolute;
    bottom: 20px;
    width: 100%;
    font-size: 12px;
    color: #555;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
}
</style>

</head>

<body>

<div class="container">
    <h1>Prestige Group</h1>
    <div class="line"></div>
    <p>
        Crafting premium digital experiences.<br>
        Our platform is launching soon.
    </p>
    <button onclick="window.location.href='mailto:info@prestigegroupmt.com'">
        Get In Touch
    </button>
</div>

<div class="footer">
    © 2026 Prestige Group — All Rights Reserved
</div>

</body>
</html>
