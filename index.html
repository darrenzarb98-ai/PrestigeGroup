<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prestige Group</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: radial-gradient(circle at center, #111, #000);
    color: #f5e7b2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
}

/* SOFT BACKGROUND LOGO */
body::before {
    content: "";
    position: absolute;
    width: 1200px;
    height: 1200px;
    background: url("Coverphoto.png") center/contain no-repeat;
    opacity: 0.08;
    right: -300px;
    top: 50%;
    transform: translateY(-50%);
}

/* PANEL */
.panel {
    position: relative;
    z-index: 2;
    background: rgba(0,0,0,0.7);
    padding: 50px 40px;
    border-radius: 20px;
    border: 1px solid rgba(212,175,55,0.2);
    backdrop-filter: blur(10px);
    text-align: center;
    max-width: 650px;
}

/* LOGO FIX */
.logo {
    width: 260px;
    margin-bottom: 20px;
    filter: drop-shadow(0 0 15px rgba(212,175,55,0.2));
}

/* TITLE */
h1 {
    font-size: 48px;
    letter-spacing: 4px;
    margin: 10px 0;
    color: #d4af37;
    text-shadow: 0 0 10px rgba(212,175,55,0.3);
}

/* LINE */
.line {
    width: 100px;
    height: 1px;
    background: linear-gradient(to right, transparent, #d4af37, transparent);
    margin: 20px auto;
}

/* TEXT */
p {
    color: #ddd;
    line-height: 1.7;
    font-size: 15px;
}

.highlight {
    color: #d4af37;
    font-weight: bold;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 12px 28px;
    border-radius: 30px;
    border: 1px solid #d4af37;
    color: #d4af37;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    background: #d4af37;
    color: black;
    box-shadow: 0 0 15px rgba(212,175,55,0.4);
}

/* FOOTER */
.footer {
    margin-top: 20px;
    font-size: 11px;
    color: #777;
}
</style>

</head>

<body>

<div class="panel">

    <img src="profilepic.png" class="logo">

    <h1>COMING SOON</h1>

    <div class="line"></div>

    <p>
        <span class="highlight">Prestige Group</span> is preparing a refined digital experience built around quality, trust, and elegance.
    </p>

    <a href="mailto:info@prestigegroupmt.com" class="btn">CONTACT US</a>

    <div class="footer">
        © 2026 Prestige Group. All rights reserved.
    </div>

</div>

</body>
</html>
