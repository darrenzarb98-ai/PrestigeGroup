<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prestige Group</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Arial, sans-serif;
      color: #f5e7b2;
      background:
        linear-gradient(rgba(0,0,0,0.78), rgba(0,0,0,0.88)),
        url("Coverphoto.png") center center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
    }

    .container {
      width: min(90%, 900px);
      padding: 40px 20px;
      animation: fadeUp 1.2s ease;
      backdrop-filter: blur(2px);
    }

    .logo {
      width: min(420px, 80vw);
      max-width: 100%;
      height: auto;
      filter: drop-shadow(0 0 18px rgba(212, 175, 55, 0.18));
      margin-bottom: 20px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.4rem);
      letter-spacing: 2px;
      color: #d4af37;
      text-transform: uppercase;
    }

    .line {
      width: 110px;
      height: 2px;
      margin: 22px auto 26px;
      background: linear-gradient(to right, transparent, #d4af37, transparent);
    }

    p {
      margin: 0 auto;
      max-width: 650px;
      font-size: clamp(1rem, 1.6vw, 1.15rem);
      line-height: 1.8;
      color: #f3e7c0;
    }

    .highlight {
      color: #d4af37;
      font-weight: 600;
    }

    .btn {
      display: inline-block;
      margin-top: 32px;
      padding: 14px 32px;
      border: 1px solid #d4af37;
      color: #d4af37;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: 0.3s ease;
      background: rgba(0, 0, 0, 0.35);
    }

    .btn:hover {
      background: #d4af37;
      color: #111;
      transform: translateY(-2px);
    }

    .footer {
      position: fixed;
      bottom: 16px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 12px;
      color: rgba(255, 235, 180, 0.65);
      letter-spacing: 0.5px;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(24px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 640px) {
      .container {
        padding: 24px 16px;
      }

      .logo {
        width: min(320px, 88vw);
      }

      .btn {
        width: 100%;
        max-width: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img src="profilepic.png" alt="Prestige Group logo" class="logo" />

    <div class="line"></div>

    <p>
      <span class="highlight">Prestige Group</span> is preparing a premium digital presence.
      Our new website is launching soon with a refined experience built around quality, trust, and elegance.
    </p>

    <a class="btn" href="mailto:info@prestigegroupmt.com">Contact Us</a>
  </div>

  <div class="footer">© 2026 Prestige Group. All rights reserved.</div>
</body>
</html>
